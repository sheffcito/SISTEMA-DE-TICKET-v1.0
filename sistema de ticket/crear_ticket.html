{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <div class="flex items-center space-x-2 mb-6">
        <a href="/" class="text-blue-600 hover:underline text-sm">&larr; Volver al Panel</a>
    </div>
    
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Crear Nuevo Ticket de Soporte</h2>
    
    <form action="/ticket/nuevo" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Título del Problema</label>
            <input type="text" name="titulo" placeholder="Ej: No me funciona la impresora de red" required 
                   class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Prioridad</label>
            <select name="prioridad" class="w-full mt-1 p-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="Baja">Baja</option>
                <option value="Media" selected>Media</option>
                <option value="Alta">Alta</option>
                <option value="Critica">Crítica</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Descripción Detallada</label>
            <textarea name="descripcion" rows="5" placeholder="Describe lo más detallado posible el inconveniente..." required 
                      class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
        </div>
        
        <div class="pt-2">
            <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded transition shadow">
                Enviar Ticket
            </button>
        </div>
    </form>
</div>
{% endblock %}
