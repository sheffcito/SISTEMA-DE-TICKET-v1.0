{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Crear una Cuenta</h2>
    
    <form action="/registro" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Nombre Completo</label>
            <input type="text" name="nombre" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
            <input type="email" name="email" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input type="password" name="contrasena" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700">Rol del Usuario</label>
            <select name="rol" class="w-full mt-1 p-2 border border-gray-300 rounded bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="Cliente">Cliente / Usuario final</option>
                <option value="Soporte">Técnico de Soporte</option>
                <option value="Admin">Administrador</option>
            </select>
        </div>
        
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
            Registrarse
        </button>
    </form>
    
    <p class="text-sm text-center text-gray-600 mt-4">
        ¿Ya tienes cuenta? <a href="/login" class="text-blue-600 hover:underline">Inicia sesión aquí</a>
    </p>
</div>
{% endblock %}
