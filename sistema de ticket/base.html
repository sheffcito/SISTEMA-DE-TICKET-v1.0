<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold">🎫 TicketPanel</a>
            <div class="flex items-center space-x-4">
                <span>Hola, <strong class="underline">{{ current_user.nombre }}</strong> ({{ current_user.rol }})</span>
<a href="/ticket/nuevo" class="bg-green-500 hover:bg-green-600 px-3 py-1.5 rounded text-sm font-semibold transition">Nuevo Ticket</a>
<a href="/logout" class="text-sm hover:underline text-gray-200">Salir</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        {% block content %} {% endblock %}
    </main>

</body>
</html>
